<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinal, Almonte & Ricth | Inteligencia Jurídica Institucional</title>
    
    <!-- Fuentes: Estilo Global Law Firm -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y Babel para JSX directo en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        latham: {
                            navy: '#002244',
                            red: '#E31837',
                            grey: {
                                light: '#F5F5F5',
                                mid: '#E0E0E0'
                            },
                            black: '#111111'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .latham-link {
            position: relative;
            display: inline-block;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .latham-link:hover {
            border-color: #E31837;
        }
        .latham-button {
            background: #002244;
            color: white;
            padding: 1rem 2rem;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.2em;
            transition: all 0.3s;
        }
        .latham-button:hover {
            background: #E31837;
        }
    </style>
</head>
<body class="bg-white text-latham-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            ShieldCheck, TrendingUp, Briefcase, Building, Gavel, 
            Phone, Mail, MapPin, Clock, Menu, X, ChevronRight, 
            PhoneForwarded, ArrowRight, Search, Globe, Users 
        } = lucide;

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Nuestra Firma', href: '#firma' },
                { name: 'Prácticas', href: '#servicios' },
                { name: 'Insights', href: '#insights' },
                { name: 'Contacto', href: '#contacto' },
            ];

            const handleSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                const data = {
                    name: form.name.value,
                    email: form.email.value,
                    message: form.message.value
                };

                try {
                    // Nota: Esta URL funciona si tienes el servidor Express corriendo en el mismo dominio.
                    // Para un archivo HTML suelto, usa Formspree o similar.
                    const response = await fetch('/api/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data),
                    });

                    if (response.ok) {
                        alert('¡Consulta enviada exitosamente!');
                        form.reset();
                    } else {
                        alert('Consulta procesada. (Nota: Para envíos reales fuera de este entorno, vincule con Formspree en el código)');
                    }
                } catch (err) {
                    alert('Error de conexión. Si usas este archivo localmente, necesitas un backend o Formspree.');
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Utility Bar */}
                    <div className="bg-latham-navy text-white text-[10px] py-2 px-6 flex justify-between items-center font-bold tracking-[0.1em] uppercase hidden md:flex border-b border-white/10">
                        <div className="flex gap-8">
                            <span className="flex items-center gap-2"><i data-lucide="globe" className="w-3 h-3"></i> República Dominicana | Global Reach</span>
                            <a href="mailto:info@oficinaespinal.do" className="hover:text-latham-red transition-colors flex items-center gap-2">
                                <i data-lucide="mail" className="w-3 h-3"></i> info@oficinaespinal.do
                            </a>
                        </div>
                        <div className="flex gap-6 items-center">
                            <span className="text-latham-red">829.442.4222</span>
                        </div>
                    </div>

                    {/* Main Navigation */}
                    <nav className={`sticky top-0 z-50 bg-white transition-all duration-300 ${scrolled ? 'shadow-xl py-3' : 'py-6'} border-b border-latham-grey-mid`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex flex-col">
                                <h1 className="text-xl md:text-2xl font-display font-extrabold tracking-tighter leading-none flex items-center gap-1">
                                    ESPINAL, ALMONTE <span className="text-latham-red">&</span> RICTH
                                </h1>
                                <p className="text-[9px] uppercase tracking-[0.3em] text-slate-400 font-bold mt-1">Inteligencia Jurídica Institucional</p>
                            </div>
                            
                            <div className="hidden lg:flex items-center gap-10 text-[11px] font-bold uppercase tracking-[0.15em]">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} className="hover:text-latham-red latham-link py-1">
                                        {link.name}
                                    </a>
                                ))}
                                <a href="#contacto" className="latham-button">Consultar</a>
                            </div>

                            <button className="lg:hidden text-latham-navy p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <i data-lucide="x" className="w-6 h-6"></i> : <i data-lucide="menu" className="w-6 h-6"></i>}
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative h-[80vh] flex items-center overflow-hidden bg-latham-navy">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1541872703-74c5e443d1fe?auto=format&fit=crop&q=80&w=2000" 
                                className="w-full h-full object-cover opacity-30 mix-blend-overlay grayscale" 
                                alt="Santo Domingo Skyline"
                            />
                            <div className="absolute inset-0 bg-gradient-to-r from-latham-navy via-latham-navy/80 to-transparent"></div>
                        </div>

                        <div className="max-w-7xl mx-auto px-6 relative z-10 w-full">
                            <div className="max-w-3xl space-y-10">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-[2px] bg-latham-red"></div>
                                    <span className="text-latham-red text-[11px] font-bold uppercase tracking-[0.4em]">Expertise • Strategy • Results</span>
                                </div>
                                <h2 className="text-5xl md:text-[80px] font-display font-extrabold leading-[0.95] text-white tracking-tighter">
                                    Soluciones Complejas <br />
                                    <span className="text-white/60">Para Desafíos</span> <br />
                                    Globales.
                                </h2>
                                <p className="text-lg md:text-xl text-slate-300 font-light leading-relaxed max-w-xl border-l border-white/20 pl-8">
                                    Lideramos la práctica legal en República Dominicana con una visión estratégica orientada a la protección de grandes capitales.
                                </p>
                                <div className="flex flex-wrap gap-6 pt-6">
                                    <a href="#servicios" className="latham-button px-12 py-5">Ver Prácticas</a>
                                    <a href="#firma" className="border border-white/30 text-white px-12 py-5 font-bold uppercase text-[12px] tracking-[0.2em] hover:bg-white hover:text-latham-navy transition-all">Nuestra Firma</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Stats */}
                    <section className="bg-latham-grey-light border-b border-latham-grey-mid py-12">
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-12">
                            {[
                                { val: '15+', label: 'Años de Experiencia' },
                                { val: '98%', label: 'Tasa de Éxito Corporativo' },
                                { val: '1.2B+', label: 'USD en Transacciones' },
                                { val: '24/7', label: 'Asesoría Crítica' }
                            ].map((stat, idx) => (
                                <div key={idx} className="flex flex-col">
                                    <span className="text-3xl font-display font-extrabold text-latham-navy leading-none">{stat.val}</span>
                                    <span className="text-[10px] uppercase font-bold text-slate-500 tracking-wider mt-1">{stat.label}</span>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Prácticas */}
                    <section id="servicios" className="py-24">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="mb-16">
                                <span className="text-latham-red text-[11px] font-bold uppercase tracking-[0.4em]">Capacidades Globales</span>
                                <h3 className="text-4xl md:text-5xl font-display font-extrabold tracking-tighter text-latham-navy mt-4">Áreas de Práctica</h3>
                            </div>
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { title: 'Corporativo & M&A', image: 'https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&q=80&w=1000' },
                                    { title: 'Inmobiliario & Turismo', image: 'https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&q=80&w=1000' },
                                    { title: 'Litigio & Arbitraje', image: 'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&q=80&w=1000' }
                                ].map((p, idx) => (
                                    <div key={idx} className="group relative overflow-hidden h-[400px]">
                                        <img src={p.image} className="w-full h-full object-cover grayscale transition-all duration-700 group-hover:grayscale-0 group-hover:scale-105" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-latham-navy to-transparent p-10 flex flex-col justify-end">
                                            <h4 className="text-2xl font-display font-extrabold text-white">{p.title}</h4>
                                            <div className="h-1 w-0 group-hover:w-full bg-latham-red transition-all duration-500 mt-4"></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contacto */}
                    <section id="contacto" className="py-24 bg-latham-grey-light">
                        <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-24">
                            <div className="flex flex-col justify-center gap-12">
                                <h3 className="text-5xl md:text-6xl font-display font-extrabold tracking-tighter text-latham-navy">Conecte con nuestra red.</h3>
                                <div className="space-y-8">
                                    <div className="flex gap-6">
                                        <div className="text-latham-red"><i data-lucide="map-pin"></i></div>
                                        <div>
                                            <span className="text-[10px] uppercase font-bold text-slate-400">Oficina Central</span>
                                            <p className="font-bold text-xl">Santo Domingo, RD</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-6">
                                        <div className="text-latham-red"><i data-lucide="phone"></i></div>
                                        <div>
                                            <span className="text-[10px] uppercase font-bold text-slate-400">Teléfono</span>
                                            <p className="font-bold text-xl">829.442.4222</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-12 shadow-2xl">
                                <form onSubmit={handleSubmit} className="space-y-8">
                                    <div>
                                        <label className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Nombre</label>
                                        <input name="name" type="text" required className="w-full border-b-2 border-latham-grey-mid py-4 focus:border-latham-navy focus:outline-none transition-all font-medium" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Email</label>
                                        <input name="email" type="email" required className="w-full border-b-2 border-latham-grey-mid py-4 focus:border-latham-navy focus:outline-none transition-all font-medium" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Consulta</label>
                                        <textarea name="message" required rows="4" className="w-full border-b-2 border-latham-grey-mid py-4 focus:border-latham-navy focus:outline-none transition-all font-medium resize-none"></textarea>
                                    </div>
                                    <button type="submit" className="latham-button w-full shadow-lg">Solicitar Consulta</button>
                                </form>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-latham-navy text-white py-16">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <h2 className="text-2xl font-display font-extrabold tracking-tighter">ESPINAL, ALMONTE <span className="text-latham-red">&</span> RICTH</h2>
                            <p className="text-slate-500 mt-4 text-xs uppercase tracking-widest">© 2024 Excelencia Jurídica Certificada. Todos los derechos reservados.</p>
                        </div>
                    </footer>

                    {/* WhatsApp */}
                    <a href="https://wa.me/18294424222" target="_blank" className="fixed bottom-10 right-10 bg-[#25D366] text-white p-5 rounded-full shadow-2xl hover:scale-110 transition-transform">
                        <i data-lucide="phone-forwarded"></i>
                    </a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
